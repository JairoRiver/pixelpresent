version: "3"

tasks:
  run:
    desc: Run the server.
    cmds:
      - go run ./cmd/server serve

  test:
    desc: Run all tests.
    cmds:
      - go test ./...

  sqlc-generate:
    desc: Generate Go code from SQL queries with sqlc.
    cmds:
      - sqlc generate

  migrate-up:
    desc: Apply all pending database migrations.
    cmds:
      - go run ./cmd/server migrate up

  migrate-down:
    desc: Revert database migrations.
    cmds:
      - go run ./cmd/server migrate down

  dev-up:
    desc: Start Postgres and Mailpit for local development.
    cmds:
      - docker compose -f docker-compose.dev.yml up -d

  dev-down:
    desc: Stop the Astro dev daemon (if running) and the dev containers.
    cmds:
      - cd web && pnpm exec astro dev stop || true
      - docker compose -f docker-compose.dev.yml down

  # --- Frontend (Astro) ---

  dev-front:
    desc: >-
      Start the Astro dev server (background daemon; proxies /api to the Go API
      on :8080). Returns right away; stop it with `task dev-down`. Logs:
      `pnpm exec astro dev logs -f` (in web/).
    dir: web
    cmds:
      # Clear any stale daemon first so a second `astro dev` can't hang on :4321.
      - pnpm exec astro dev stop > /dev/null 2>&1 || true
      - pnpm exec astro dev

  web-build:
    desc: Build the static frontend into web/dist.
    dir: web
    cmds:
      - pnpm build

  web-preview:
    desc: Preview the built static frontend (static only; /api is not proxied).
    dir: web
    cmds:
      - pnpm preview

  # --- Production build ---

  build:
    desc: >-
      Build the frontend and compile the single Go binary with the static site
      embedded. Output: bin/pixelpresent.
    cmds:
      - task: web-build
      # Astro empties its outDir (internal/web/dist) on build, removing the
      # tracked placeholder; restore it so the working tree stays clean.
      - touch internal/web/dist/.gitkeep
      - go build -o bin/pixelpresent ./cmd/server

  prod:
    desc: >-
      Build the binary and run it like production (APP_ENV=production: no dev
      docs). Serves the embedded frontend and the API on :8080. Needs the DB
      (run `task dev-up` and `task migrate-up` first).
    cmds:
      - task: build
      - APP_ENV=production ./bin/pixelpresent serve

  # --- Full local stack ---

  dev-server:
    desc: >-
      Backend dev stack — containers, migrations, and the Go API in the
      foreground (Ctrl+C stops it). Pair with `dev-front` for the frontend.
    cmds:
      - task: dev-up
      - task: db-wait
      - task: migrate-up
      - go run ./cmd/server serve

  db-wait:
    internal: true
    cmds:
      - |
        for i in $(seq 1 30); do
          docker compose -f docker-compose.dev.yml exec -T postgres pg_isready -U pixelpresent >/dev/null 2>&1 && exit 0
          sleep 1
        done
        echo "postgres did not become ready in time" >&2
        exit 1
