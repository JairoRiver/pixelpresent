services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: pixelpresent
      POSTGRES_PASSWORD: pixelpresent
      POSTGRES_DB: pixelpresent
    ports:
      - "5432:5432"
    volumes:
      - pixelpresent_postgres_data:/var/lib/postgresql/data

  mailpit:
    image: axllent/mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  pixelpresent_postgres_data:
