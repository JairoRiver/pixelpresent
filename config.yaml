environment: ${APP_ENV:-development}
app:
  # Public base URL used to build links sent by email (e.g. magic links).
  base_url: ${APP_BASE_URL:-http://localhost:8080}
server:
  # Address the HTTP server listens on (host:port; host optional).
  addr: ${SERVER_ADDR:-:8080}
auth:
  # How long a login magic link stays valid (Go duration, e.g. 15m, 1h).
  magic_link_ttl: ${MAGIC_LINK_TTL:-15m}
  # How long a session cookie stays valid (Go duration). Default 720h = 30 days.
  session_ttl: ${SESSION_TTL:-720h}
  # Secret used to sign (HMAC-SHA256) session cookies. Set via env in production
  # (systemd); the dev default below is NOT safe for production.
  session_secret: ${SESSION_SECRET:-dev-insecure-session-secret-change-me}
log:
  level: ${LOG_LEVEL:-info}
database:
  dsn: ${DATABASE_DSN:-postgres://pixelpresent:pixelpresent@localhost:5432/pixelpresent?sslmode=disable}
email:
  host: ${SMTP_HOST:-localhost}
  port: ${SMTP_PORT:-1025}
  username: ${SMTP_USERNAME:-}
  password: ${SMTP_PASSWORD:-}
  from: ${SMTP_FROM:-no-reply@pixelpresent.local}
